name: build
description: 'GameMaker build process.'

inputs:
  yyc:
    description: "'true' for YYC, 'false' for VM"
    required: true
  access-key:
    description: 'GameMaker access key (secrets.GAMEMAKER_ACCESS_KEY)'
    required: true
  runtime-version:
    description: 'GameMaker runtime version (vars.GM_RUNTIME_VERSION)'
    required: true
  cache-root:
    description: 'Persistent GameMaker cache root for self-hosted runners'
    required: false
    default: 'E:\gm-cache'

outputs:
  out-dir:
    description: 'Directory containing the build package'
    value: ${{ steps.build.outputs.out-dir }}
  out-name:
    description: 'File name of the build package'
    value: ${{ steps.build.outputs.out-name }}
  user-dir:
    description: 'Igor user directory'
    value: ${{ steps.setup.outputs.user-dir }}
  runtime-dir:
    description: 'GameMaker runtime directory'
    value: ${{ steps.setup.outputs.runtime-dir }}
  cache-dir:
    description: 'GameMaker asset cache directory'
    value: ${{ steps.setup.outputs.cache-dir }}
  temp-dir:
    description: 'GameMaker temp directory'
    value: ${{ steps.setup.outputs.temp-dir }}
  bootstrapper-dir:
    description: 'Igor bootstrapper directory'
    value: ${{ steps.setup.outputs.bootstrapper-dir }}

runs:
  using: composite
  steps:
    - name: Resolve GameMaker cache root
      id: gm-cache
      shell: powershell
      run: |
        $cacheRoot = if ($env:GM_CACHE_ROOT) { $env:GM_CACHE_ROOT } else { '${{ inputs.cache-root }}' }
        $runtimeCache = Join-Path $cacheRoot 'runtimes'
        $bootstrapperCache = Join-Path $cacheRoot 'bootstrapper'
        $assetCache = Join-Path $cacheRoot 'assets'
        $tempCache  = Join-Path $cacheRoot 'temp'
        New-Item -ItemType Directory -Force -Path $runtimeCache, $bootstrapperCache, $assetCache, $tempCache | Out-Null

        "root=$cacheRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "GM_CACHE_ROOT=$cacheRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Host "GameMaker cache root -> $cacheRoot"
        Write-Host "Runtime cache -> $runtimeCache"
        Write-Host "Asset cache -> $assetCache"

    - name: Configure YYC Visual Studio path
      shell: powershell
      run: |
        $wrapper = (Resolve-Path '.github/gamemaker/vsdevcmd-gm.bat').Path

        $cacheRoot = '${{ steps.gm-cache.outputs.root }}'
        $assetCache = Join-Path $cacheRoot 'assets'
        $tempCache  = Join-Path $cacheRoot 'temp'
        New-Item -ItemType Directory -Force -Path $assetCache, $tempCache | Out-Null

        $settings = @{
          'machine.Platform Settings.Windows.visual_studio_path' = $wrapper
          'machine.Platform Settings.Xbox Series XS.visual_studio_path' = $wrapper
          'machine.Platform Settings.Switch.visual_studio_path' = $wrapper
          'machine.General Settings.Paths.IDE.AssetCacheFolder' = $assetCache
          'machine.General Settings.Paths.IDE.TempFolder' = $tempCache
        }
        $settings | ConvertTo-Json | Set-Content .github/gamemaker/local_settings.windows-yyc.generated.json -Encoding UTF8

    - name: Configure Steamworks SDK path
      shell: powershell
      run: |
        $sdk = 'C:\steamworksSdk'
        $steamDll = Join-Path $sdk 'redistributable_bin\win64\steam_api64.dll'
        if (!(Test-Path $steamDll)) { throw "Steamworks SDK not found at $sdk" }

        "YYEXTOPT_Steamworks_SteamSDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        $appId = if ($env:STEAM_APP_ID) { $env:STEAM_APP_ID } else { '2231450' }
        "YYEXTOPT_Steamworks_AppID=$appId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Host "Steam App ID -> $appId"

        $defaultSdk = Join-Path (Split-Path $env:GITHUB_WORKSPACE -Parent) 'steamworks_sdk'
        if (Test-Path $defaultSdk) {
          $defaultDll = Join-Path $defaultSdk 'redistributable_bin\win64\steam_api64.dll'
          if (!(Test-Path $defaultDll)) { throw "Existing Steamworks SDK fallback path is invalid: $defaultSdk" }
        } else {
          New-Item -ItemType Junction -Path $defaultSdk -Target $sdk | Out-Null
        }

    - name: Setup Igor (GameMaker runtime + license)
      id: setup
      uses: Mackery6969/igor-setup@main
      with:
        access-key: ${{ inputs.access-key }}
        target-yyp: PizzaTower_GM2.yyp
        runtime-version: ${{ inputs.runtime-version }}
        local-settings-override-file: .github/gamemaker/local_settings.windows-yyc.generated.json
        modules: windows
        cache: 'true'
        cache-root: ${{ steps.gm-cache.outputs.root }}

    - name: Report GameMaker cache paths
      shell: powershell
      run: |
        Write-Host "Igor user dir -> ${{ steps.setup.outputs.user-dir }}"
        Write-Host "Runtime dir -> ${{ steps.setup.outputs.runtime-dir }}"
        Write-Host "Asset cache dir -> ${{ steps.setup.outputs.cache-dir }}"
        Write-Host "Temp dir -> ${{ steps.setup.outputs.temp-dir }}"
        Write-Host "Bootstrapper dir -> ${{ steps.setup.outputs.bootstrapper-dir }}"

    - name: Build (Windows)
      id: build
      uses: bscotch/igor-build@v1.3.3
      with:
        user-dir: ${{ steps.setup.outputs.user-dir }}
        yyp-path: ${{ github.workspace }}\PizzaTower_GM2.yyp
        platform: windows
        yyc: ${{ inputs.yyc }}
        save-logs: 'true'
